<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galaxy Shooter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #0a0514, #1a002a, #0a0215);
            color: white;
            font-family: 'Inter', sans-serif;
            touch-action: none; /* Prevent scroll on touch devices */
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass through to canvas when playing */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            pointer-events: auto; /* Enable clicks on buttons */
            background: rgba(15, 23, 42, 0.75); /* Modern Slate Background */
            padding: 3rem 4rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-align: center;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .screen.active {
            display: flex;
        }

        .hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            box-sizing: border-box;
            z-index: 5;
            display: none;
        }

        .hud.active {
            display: flex;
        }

        .hud-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 1rem 1.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .btn {
            padding: 0.75rem 2rem;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.645, 0.045, 0.355, 1);
            border-radius: 8px;
            border: none;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2), 0 4px 6px -2px rgba(0, 0, 0, 0.1);
        }

        .btn:active {
            transform: translateY(1px);
        }

        /* Ant Design Color Palette */
        .btn-normal { background-color: #52c41a; }
        .btn-normal:hover { background-color: #73d13d; }
        
        .btn-medium { background-color: #faad14; }
        .btn-medium:hover { background-color: #ffc53d; }
        
        .btn-hard { background-color: #ff4d4f; }
        .btn-hard:hover { background-color: #ff7875; }

        .btn-primary { background-color: #1890ff; }
        .btn-primary:hover { background-color: #40a9ff; }

        .arcade-font {
            font-family: 'Press Start 2P', monospace;
        }

        .health-bar-container {
            width: 160px;
            height: 12px;
            background: rgba(0,0,0,0.5);
            border-radius: 6px;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        .health-bar {
            height: 100%;
            background: linear-gradient(90deg, #52c41a, #73d13d);
            width: 100%;
            transition: width 0.3s ease-out, background-color 0.3s;
            border-radius: 6px;
        }
        
        .shield-bar {
            position: absolute;
            top: 0; left: 0;
            height: 100%;
            background: linear-gradient(90deg, #1890ff, #40a9ff);
            width: 0%;
            transition: width 0.3s ease-out;
            border-radius: 6px;
        }

        /* Mobile controls hint */
        .mobile-hint {
            display: none;
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.8);
            pointer-events: none;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        @media (max-width: 768px) {
            .mobile-hint { display: block; }
            .hud { padding: 1rem; }
            .hud-panel { padding: 0.75rem 1rem; }
            .health-bar-container { width: 110px; }
            .screen { padding: 2rem 1rem; width: 90%; max-width: 400px; }
            .btn { font-size: 0.85rem; padding: 0.8rem 1rem; width: 100%; margin-bottom: 0.5rem; }
            .flex-col.sm\:flex-row { flex-direction: column; width: 100%; }
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <!-- UI Overlay -->
    <div class="ui-layer">
        <!-- Start Screen -->
        <div id="startScreen" class="screen active">
            <h1 class="text-3xl md:text-5xl mb-2 arcade-font tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500" style="text-shadow: 0 4px 20px rgba(168, 85, 247, 0.4);">GALAXY<br>SHOOTER</h1>
            <p class="text-sm text-gray-300 mt-6 max-w-md leading-relaxed">
                Use <span class="font-semibold text-white bg-gray-800/80 px-2 py-1 rounded shadow-inner">Arrow Keys</span> or <span class="font-semibold text-white bg-gray-800/80 px-2 py-1 rounded shadow-inner">A, D</span> to move.<br>
                Press <span class="font-semibold text-white bg-gray-800/80 px-2 py-1 rounded shadow-inner">Space</span> to shoot.<br><br>
                <span class="text-gray-400 text-xs">On mobile, drag anywhere to move & auto-shoot.</span>
            </p>
            <div class="w-full h-px bg-white/10 my-6"></div>
            <p class="mb-4 text-sm font-semibold tracking-wide text-gray-200 uppercase">Select Difficulty</p>
            <div class="flex flex-col sm:flex-row gap-3 w-full sm:w-auto">
                <button class="btn btn-normal diff-btn" data-diff="NORMAL">Normal</button>
                <button class="btn btn-medium diff-btn" data-diff="MEDIUM">Medium</button>
                <button class="btn btn-hard diff-btn" data-diff="HARD">Hard</button>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOverScreen" class="screen">
            <h1 class="text-3xl md:text-5xl mb-4 arcade-font text-red-500 drop-shadow-[0_0_15px_rgba(255,77,79,0.8)]">MISSION FAILED</h1>
            <p class="text-sm font-semibold mt-4 text-gray-300 tracking-widest uppercase">Final Score</p>
            <p class="text-4xl font-bold text-white mt-2 arcade-font" id="finalScore">0</p>
            <div class="flex flex-col sm:flex-row gap-4 mt-8 w-full sm:w-auto justify-center">
                <button id="restartBtn" class="btn btn-primary w-full sm:w-auto">Try Again</button>
                <button id="menuBtn" class="btn btn-medium w-full sm:w-auto">Main Menu</button>
            </div>
        </div>
    </div>

    <!-- Announcement Overlay -->
    <div id="announcement" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 arcade-font text-2xl md:text-4xl z-20 pointer-events-none text-center leading-loose text-white drop-shadow-2xl" style="display: none;"></div>

    <!-- HUD -->
    <div id="hud" class="hud">
        <div class="hud-panel flex flex-col gap-1">
            <div class="text-gray-400 text-[10px] font-bold tracking-widest uppercase">Score</div>
            <div class="text-xl text-white arcade-font" id="scoreDisplay">0</div>
            <div class="text-xs mt-1 text-gray-300 font-medium tracking-wide">Level <span id="levelDisplay" class="text-white font-bold">1</span> &bull; Wave <span id="waveDisplay" class="text-white font-bold">1</span></div>
        </div>
        <div class="hud-panel flex flex-col gap-1 items-end">
            <div class="text-gray-400 text-[10px] font-bold tracking-widest uppercase mb-1">Integrity</div>
            <div class="health-bar-container">
                <div id="healthBar" class="health-bar"></div>
                <div id="shieldBar" class="shield-bar"></div>
            </div>
        </div>
    </div>
    <div id="mobileHint" class="mobile-hint font-medium tracking-wide">Drag anywhere to move & shoot</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // UI Elements
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const hud = document.getElementById('hud');
        const restartBtn = document.getElementById('restartBtn');
        const menuBtn = document.getElementById('menuBtn');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const finalScore = document.getElementById('finalScore');
        const levelDisplay = document.getElementById('levelDisplay');
        const waveDisplay = document.getElementById('waveDisplay');
        const healthBar = document.getElementById('healthBar');
        const shieldBar = document.getElementById('shieldBar');
        const mobileHint = document.getElementById('mobileHint');
        const announcement = document.getElementById('announcement');

        // Game State Variables
        let animationId;
        let gameState = 'START'; 
        let score = 0;
        let level = 1;
        let wave = 1;
        let frameCount = 0;
        let isTransitioning = false;
        let difficulty = 'NORMAL';
        let announcementTimeout = null; // Used to clear lingering events
        
        // Difficulty Config Multipliers
        const diffSettings = {
            'NORMAL': { hpMult: 1, speedMult: 1, fireMult: 1, playerHp: 100, scoreMult: 1 },
            'MEDIUM': { hpMult: 1.5, speedMult: 1.3, fireMult: 0.6, playerHp: 75, scoreMult: 1.5 },
            'HARD': { hpMult: 2, speedMult: 1.6, fireMult: 0.3, playerHp: 50, scoreMult: 2 }
        };
        
        let particles = [];
        let enemies = [];
        let projectiles = [];
        let enemyProjectiles = [];
        let stars = [];
        let nebulae = [];
        let powerups = [];
        let floatingTexts = [];
        let player = null; 
        
        // Resize Canvas
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            if (player) {
                player.y = canvas.height - 100;
                if (player.x > canvas.width - player.width/2) {
                    player.x = canvas.width - player.width/2;
                }
            }
        }
        window.addEventListener('resize', resize);
        resize();

        // Key states
        const keys = { ArrowLeft: false, ArrowRight: false, a: false, d: false, ' ': false };

        const randomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        const dist = (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1);

        // --- SOUND MANAGER ---
        const SoundManager = {
            ctx: null,
            init() {
                if (!this.ctx) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    this.ctx = new AudioContext();
                }
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            playTone(type, startFreq, endFreq, duration, vol) {
                if (!this.ctx) return;
                try {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = type;
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    
                    const now = this.ctx.currentTime;
                    osc.frequency.setValueAtTime(startFreq, now);
                    if (endFreq) osc.frequency.exponentialRampToValueAtTime(endFreq, now + duration);
                    
                    gain.gain.setValueAtTime(vol, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
                    
                    osc.start(now);
                    osc.stop(now + duration);
                } catch(e) {}
            },
            shoot() { this.playTone('square', 800, 200, 0.1, 0.05); },
            enemyShoot() { this.playTone('sawtooth', 300, 100, 0.2, 0.05); },
            explosion() { this.playTone('sawtooth', 150, 10, 0.3, 0.1); },
            bossExplosion() { 
                this.playTone('square', 100, 10, 1, 0.2); 
                setTimeout(() => this.playTone('sawtooth', 50, 5, 1.5, 0.2), 200);
            },
            powerup() { this.playTone('sine', 400, 1200, 0.3, 0.1); },
            shieldHit() { this.playTone('sine', 800, 600, 0.15, 0.1); },
            levelUp() { 
                this.playTone('sine', 400, 800, 0.3, 0.1); 
                setTimeout(() => this.playTone('sine', 600, 1200, 0.4, 0.1), 150); 
            },
            bossWarning() {
                this.playTone('sawtooth', 200, 200, 0.5, 0.1);
                setTimeout(() => this.playTone('sawtooth', 150, 150, 0.5, 0.1), 600);
            }
        };

        // --- CLASSES ---

        class Nebula {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = randomInt(200, 600);
                this.speed = (Math.random() * 0.2) + 0.05;
                this.baseHue = 280; // Starts purple
            }
            update() {
                this.y += this.speed;
                if (gameState === 'PLAYING') this.y += this.speed * 1.5; 
                
                if (this.y - this.radius > canvas.height) {
                    this.y = -this.radius;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
                const currentHue = (this.baseHue + (level * 40)) % 360;
                gradient.addColorStop(0, `hsla(${currentHue}, 80%, 30%, 0.15)`);
                gradient.addColorStop(1, `hsla(${currentHue}, 80%, 30%, 0)`);
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Star {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speed = (Math.random() * 0.5) + 0.1;
                this.alpha = Math.random();
                const colors = ['#fff', '#fdf', '#dff', '#eef'];
                this.color = colors[randomInt(0, colors.length-1)];
            }
            update() {
                this.y += this.speed;
                if (gameState === 'PLAYING') this.y += this.speed * 2; 
                if (this.y > canvas.height) {
                    this.y = 0;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        class FloatingText {
            constructor(x, y, text, color) {
                this.x = x; this.y = y; this.text = text; this.color = color;
                this.alpha = 1; this.velocity = -1.5;
            }
            update() { this.y += this.velocity; this.alpha -= 0.02; }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.font = '10px "Press Start 2P", monospace';
                ctx.textAlign = 'center';
                ctx.shadowBlur = 5;
                ctx.shadowColor = this.color;
                ctx.fillText(this.text, this.x, this.y);
                ctx.restore();
            }
        }

        class Player {
            constructor() {
                this.width = 50;
                this.height = 60;
                this.x = canvas.width / 2;
                this.y = canvas.height - 100;
                this.speed = 7;
                this.maxHealth = diffSettings[difficulty].playerHp;
                this.health = this.maxHealth;
                this.shieldHp = 0; 
                this.maxShield = 50;
                this.lastShot = 0;
                this.fireRate = 10; 
                this.isInvulnerable = false;
                this.invulnerableTimer = 0;
                this.weaponLevel = 3; 
            }

            draw() {
                ctx.save();
                if (this.isInvulnerable) {
                    ctx.globalAlpha = (frameCount % 10 < 5) ? 0.5 : 1; 
                }
                ctx.translate(this.x, this.y);
                
                if (this.shieldHp > 0) {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.width, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0, 200, 255, ${0.1 + (this.shieldHp/this.maxShield)*0.2})`;
                    ctx.fill();
                    ctx.strokeStyle = `rgba(0, 255, 255, ${0.5 + (this.shieldHp/this.maxShield)*0.5})`;
                    ctx.lineWidth = 3;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#0ff';
                    ctx.stroke();
                    ctx.shadowBlur = 0; 
                }

                ctx.fillStyle = '#0f0'; 
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#0f0';
                
                ctx.beginPath(); 
                ctx.moveTo(-5, this.height/2);
                ctx.lineTo(5, this.height/2);
                ctx.lineTo(0, this.height/2 + (Math.random() * 20 + 15));
                ctx.fill();
                
                ctx.beginPath(); 
                ctx.moveTo(-15, this.height/2 - 5);
                ctx.lineTo(-5, this.height/2 - 5);
                ctx.lineTo(-10, this.height/2 + (Math.random() * 10 + 10));
                ctx.fill();

                ctx.beginPath(); 
                ctx.moveTo(15, this.height/2 - 5);
                ctx.lineTo(5, this.height/2 - 5);
                ctx.lineTo(10, this.height/2 + (Math.random() * 10 + 10));
                ctx.fill();

                ctx.shadowBlur = 10;
                ctx.shadowColor = '#f00';
                
                ctx.beginPath();
                ctx.moveTo(0, -this.height / 2); 
                ctx.lineTo(10, -this.height / 4);
                ctx.lineTo(this.width / 2, this.height / 4); 
                ctx.lineTo(this.width / 2 - 5, this.height / 2); 
                ctx.lineTo(15, this.height / 2 - 10);
                ctx.lineTo(10, this.height / 2);
                ctx.lineTo(-10, this.height / 2);
                ctx.lineTo(-15, this.height / 2 - 10);
                ctx.lineTo(-this.width / 2 + 5, this.height / 2); 
                ctx.lineTo(-this.width / 2, this.height / 4); 
                ctx.lineTo(-10, -this.height / 4);
                ctx.closePath();
                
                ctx.fillStyle = '#b00';
                ctx.fill();
                ctx.strokeStyle = '#f00';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.shadowColor = '#0f0';
                ctx.beginPath();
                ctx.moveTo(0, -this.height / 4);
                ctx.lineTo(5, 0);
                ctx.lineTo(0, this.height / 4);
                ctx.lineTo(-5, 0);
                ctx.closePath();
                ctx.fillStyle = '#0f0';
                ctx.fill();

                ctx.restore();
            }

            update() {
                if ((keys.ArrowLeft || keys.a) && this.x - this.width/2 > 0) this.x -= this.speed;
                if ((keys.ArrowRight || keys.d) && this.x + this.width/2 < canvas.width) this.x += this.speed;

                if (keys[' '] && frameCount - this.lastShot > this.fireRate) this.shoot();

                if (this.isInvulnerable) {
                    this.invulnerableTimer--;
                    if (this.invulnerableTimer <= 0) this.isInvulnerable = false;
                }
            }

            shoot() {
                SoundManager.shoot();
                const projColor = '#ff00ff'; 
                const projSpeed = 15;
                const projLength = 20;

                projectiles.push(new Projectile(this.x, this.y - this.height/2, projSpeed, projColor, 0, projLength));
                
                let spread = 1;
                while (spread < this.weaponLevel) {
                    const offset = spread * 10;
                    const velocity = spread * 0.5;
                    projectiles.push(new Projectile(this.x - offset, this.y - this.height/2 + (spread*5), projSpeed, projColor, -velocity, projLength));
                    projectiles.push(new Projectile(this.x + offset, this.y - this.height/2 + (spread*5), projSpeed, projColor, velocity, projLength));
                    spread++;
                }
                this.lastShot = frameCount;
            }

            takeDamage(amount) {
                if (this.isInvulnerable) return;
                
                if (this.shieldHp > 0) {
                    SoundManager.shieldHit();
                    createParticles(this.x, this.y, '#0ff', 15, 6);
                    this.shieldHp -= amount;
                    if (this.shieldHp < 0) {
                        amount = Math.abs(this.shieldHp); 
                        this.shieldHp = 0;
                    } else {
                        updateHealthBar();
                        return; 
                    }
                }

                SoundManager.explosion();
                this.health -= amount;
                createParticles(this.x, this.y, '#f00', 10);
                
                if (this.health <= 0) {
                    this.health = 0;
                    endGame();
                } else {
                    this.isInvulnerable = true;
                    this.invulnerableTimer = 60;
                }
                updateHealthBar();
            }
        }

        class Projectile {
            constructor(x, y, speed, color, velocityX = 0, length = 6, isBoss = false) {
                this.x = x; this.y = y; this.speed = speed; this.color = color;
                this.radius = isBoss ? 5 : 3; this.velocityX = velocityX;
                this.length = length; this.isBoss = isBoss;
            }
            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - this.velocityX * 2, this.y + this.length);
                ctx.strokeStyle = '#ffffff'; ctx.lineWidth = this.radius * 1.5;
                ctx.lineCap = 'round'; ctx.stroke();
                ctx.strokeStyle = this.color; ctx.lineWidth = this.radius;
                ctx.shadowBlur = 10; ctx.shadowColor = this.color;
                ctx.stroke(); ctx.restore();
            }
            update() { this.y -= this.speed; this.x += this.velocityX; }
        }

        class PowerUp {
            constructor(x, y) {
                this.x = x; this.y = y; this.radius = 15; this.speed = 2;
                const rand = Math.random();
                if (rand < 0.4) { this.type = 1; this.color = '#0ff'; this.icon = 'W'; } 
                else if (rand < 0.8) { this.type = 2; this.color = '#0f0'; this.icon = 'H'; } 
                else { this.type = 3; this.color = '#0066ff'; this.icon = 'S'; } 
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y);
                ctx.shadowBlur = 15; ctx.shadowColor = this.color;
                ctx.strokeStyle = this.color; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2); ctx.stroke();
                ctx.fillStyle = this.color; ctx.font = '12px "Press Start 2P"';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(this.icon, 0, 4); ctx.restore();
            }
            update() { this.y += this.speed; }
        }

        class Enemy {
            constructor(x, y, type, row, col) {
                this.x = x; this.y = y; this.targetX = x; this.targetY = y;
                this.type = type; this.row = row; this.col = col; this.state = 'ENTERING'; 
                
                const diffObj = diffSettings[difficulty];
                const healthMultiplier = (1 + (level * 0.5)) * diffObj.hpMult;
                const scoreMultiplier = level * diffObj.scoreMult;

                switch(type) {
                    case 4: 
                        this.width = 120; this.height = 80; this.color = '#ff0000';
                        this.coreColor = '#ffaa00'; this.health = Math.floor(150 * healthMultiplier);
                        this.scoreValue = 5000 * scoreMultiplier; this.speed = 1 * diffObj.speedMult; break;
                    case 2: 
                        this.width = 40; this.height = 30; this.color = '#00ffff';
                        this.coreColor = '#00ff00'; this.health = Math.floor(3 * healthMultiplier);
                        this.scoreValue = 150 * scoreMultiplier; this.speed = (2 + (level * 0.2)) * diffObj.speedMult; break;
                    case 3: 
                        this.width = 40; this.height = 35; this.color = '#ffaa00';
                        this.coreColor = '#ffff00'; this.health = Math.floor(5 * healthMultiplier);
                        this.scoreValue = 200 * scoreMultiplier; this.speed = (2 + (level * 0.2)) * diffObj.speedMult; break;
                    default: 
                        this.width = 35; this.height = 30; this.color = '#ff00ff';
                        this.coreColor = '#ff0000'; this.health = Math.floor(2 * healthMultiplier);
                        this.scoreValue = 100 * scoreMultiplier; this.speed = (2 + (level * 0.2)) * diffObj.speedMult;
                }
                
                this.hoverOffset = Math.random() * Math.PI * 2;
                this.lastShot = randomInt(0, 200); 
                this.bossDir = 1;
            }

            draw() {
                ctx.save(); ctx.translate(this.x, this.y);
                if (this.state === 'ATTACKING') ctx.rotate(Math.atan2(player.y - this.y, player.x - this.x) - Math.PI/2);
                ctx.shadowBlur = 15; ctx.shadowColor = this.color;
                
                const scale = this.type === 4 ? 2.5 : 1;
                ctx.scale(scale, scale);

                ctx.fillStyle = '#111'; ctx.strokeStyle = this.color; ctx.lineWidth = 2;
                const baseW = this.type === 4 ? 48 : this.width;
                const baseH = this.type === 4 ? 32 : this.height;

                ctx.beginPath(); ctx.ellipse(0, 0, baseW/2, baseH/2, 0, 0, Math.PI*2);
                ctx.fill(); ctx.stroke();

                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.beginPath(); ctx.moveTo(baseW/2, -5); ctx.lineTo(baseW, -baseH/2); ctx.lineTo(baseW/2, 5);
                ctx.fill(); ctx.stroke();
                
                ctx.beginPath(); ctx.moveTo(-baseW/2, -5); ctx.lineTo(-baseW, -baseH/2); ctx.lineTo(-baseW/2, 5);
                ctx.fill(); ctx.stroke();

                ctx.shadowBlur = 20; ctx.shadowColor = this.coreColor; ctx.fillStyle = this.coreColor;
                ctx.beginPath(); ctx.arc(0, baseH/4, 5, 0, Math.PI*2); ctx.fill();

                ctx.shadowBlur = 0;
                ctx.beginPath(); ctx.moveTo(5, baseH/2); ctx.lineTo(10, baseH/2 + 10);
                ctx.moveTo(-5, baseH/2); ctx.lineTo(-10, baseH/2 + 10); ctx.stroke();
                
                if (this.type === 4) {
                    ctx.fillStyle = this.color;
                    ctx.beginPath(); ctx.arc(-10, -5, 3, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(10, -5, 3, 0, Math.PI*2); ctx.fill();
                }

                ctx.restore();
                
                if (this.type === 4 && this.state !== 'ENTERING') {
                    ctx.fillStyle = '#333'; ctx.fillRect(this.x - 60, this.y - 60, 120, 6);
                    const diffObj = diffSettings[difficulty];
                    const maxHp = Math.floor(150 * (1 + (level * 0.5)) * diffObj.hpMult);
                    ctx.fillStyle = '#f00'; ctx.fillRect(this.x - 60, this.y - 60, 120 * (this.health / maxHp), 6);
                }
            }

            update() {
                if (this.state === 'ENTERING') {
                    this.y += this.speed * 2;
                    if (this.y >= this.targetY) { this.y = this.targetY; this.state = 'FORMATION'; }
                } else if (this.state === 'FORMATION') {
                    if (this.type === 4) {
                        this.x += this.speed * 2 * this.bossDir;
                        if (this.x > canvas.width - this.width || this.x < this.width) this.bossDir *= -1;
                        this.y = this.targetY + Math.sin(frameCount * 0.05) * 15;
                    } else {
                        this.x = this.targetX + Math.sin(frameCount * 0.02 + this.hoverOffset) * 30;
                        this.y = this.targetY + Math.cos(frameCount * 0.05 + this.hoverOffset) * 5;
                        if (Math.random() < 0.0005 * level && this.y > 0) this.state = 'ATTACKING';
                    }
                } else if (this.state === 'ATTACKING') {
                    this.y += this.speed * 1.5;
                    if (this.x < player.x) this.x += this.speed * 0.5;
                    if (this.x > player.x) this.x -= this.speed * 0.5;
                }

                const diffObj = diffSettings[difficulty];
                if (this.type === 4) {
                    if (frameCount % Math.max(30, 80 - level*5) === 0) this.shootBoss();
                } else {
                    const shootThreshold = Math.max(20, (150 - (level * 10)) * diffObj.fireMult); 
                    if (frameCount - this.lastShot > shootThreshold) {
                        if (Math.random() < ((0.1 + (level * 0.02)) * (1/diffObj.fireMult))) this.shoot();
                        this.lastShot = frameCount;
                    }
                }
            }

            shoot() { SoundManager.enemyShoot(); enemyProjectiles.push(new Projectile(this.x, this.y + this.height/2, -4, this.coreColor, 0, 8)); }
            shootBoss() {
                SoundManager.enemyShoot();
                enemyProjectiles.push(new Projectile(this.x, this.y + this.height/2, -6, this.coreColor, 0, 12, true));
                enemyProjectiles.push(new Projectile(this.x, this.y + this.height/2, -5, this.coreColor, -2, 12, true));
                enemyProjectiles.push(new Projectile(this.x, this.y + this.height/2, -5, this.coreColor, 2, 12, true));
            }
        }

        class Particle {
            constructor(x, y, color, speed) {
                this.x = x; this.y = y; this.color = color;
                this.radius = Math.random() * 3 + 1;
                this.velocity = { x: (Math.random() - 0.5) * speed, y: (Math.random() - 0.5) * speed };
                this.alpha = 1; this.decay = Math.random() * 0.02 + 0.015;
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha; ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.shadowBlur = 10; ctx.shadowColor = this.color;
                ctx.fill(); ctx.restore();
            }
            update() { this.x += this.velocity.x; this.y += this.velocity.y; this.alpha -= this.decay; }
        }

        // --- GLOBAL FUNCTIONS ---
        
        function initBackground() {
            stars = []; nebulae = [];
            for (let i = 0; i < 150; i++) stars.push(new Star());
            for (let i = 0; i < 5; i++) nebulae.push(new Nebula());
        }

        function createParticles(x, y, color, count, speed = 8) {
            for (let i = 0; i < count; i++) particles.push(new Particle(x, y, color, speed));
        }

        function showAnnouncement(text, duration = 2000, callback) {
            announcement.innerHTML = text;
            announcement.style.display = 'block';
            
            clearTimeout(announcementTimeout);
            announcementTimeout = setTimeout(() => {
                announcement.style.display = 'none';
                if (callback && gameState === 'PLAYING') callback();
            }, duration);
        }

        function buildFormation() {
            if (level % 5 === 0 && wave === 1) {
                SoundManager.bossWarning();
                const boss = new Enemy(canvas.width/2, -150, 4, 0, 0);
                boss.targetY = 120;
                enemies.push(boss);
                return;
            }

            const rows = Math.min(3 + Math.floor(wave / 2) + Math.floor(level / 2), 6);
            const cols = window.innerWidth < 600 ? 5 : 9; 
            const spacingX = window.innerWidth < 600 ? 55 : 60; 
            const spacingY = 50;
            
            const startX = (canvas.width - (cols - 1) * spacingX) / 2;
            const startY = 60;
            const pattern = wave % 3;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    let skip = false;
                    
                    if (pattern === 1 && ((r % 2 === 0 && c % 2 !== 0) || (r % 2 !== 0 && c % 2 === 0))) skip = true;
                    else if (pattern === 2 && r < Math.abs(c - Math.floor(cols / 2))) skip = true;
                    else if (pattern === 0 && ((cols === 9 && (c === 2 || c === 6)) || (cols === 5 && (c === 1 || c === 3)))) skip = true;

                    if (skip) continue;

                    let type = 1; 
                    if (r === 0) type = 3; 
                    else if (r === 1 || r === 2) type = 2; 

                    const targetX = startX + c * spacingX;
                    const targetY = startY + r * spacingY;
                    
                    enemies.push(new Enemy(targetX, -100 - (r * 50), type, r, c));
                    enemies[enemies.length-1].targetY = targetY;
                    enemies[enemies.length-1].targetX = targetX;
                }
            }
        }

        function spawnEnemyFormation() {
            if (gameState !== 'PLAYING' || isTransitioning) return;

            if (enemies.length === 0 && frameCount > 60) {
                isTransitioning = true;
                wave++;
                
                if (wave > 3 && level % 5 !== 0) { level++; wave = 1; SoundManager.levelUp(); } 
                else if (level % 5 === 0 && wave > 1) { level++; wave = 1; SoundManager.levelUp(); }
                
                levelDisplay.innerText = level; waveDisplay.innerText = wave;
                
                player.health = Math.min(player.maxHealth, player.health + 20);
                updateHealthBar();

                const announceText = (level % 5 === 0 && wave === 1) 
                    ? `<span style="color:#ff4d4f">WARNING</span><br>BOSS APPROACHING`
                    : `LEVEL ${level}<br>WAVE ${wave}`;

                showAnnouncement(announceText, 2500, () => { buildFormation(); isTransitioning = false; });
            }
        }

        function updateHealthBar() {
            const percent = Math.max(0, (player.health / player.maxHealth) * 100);
            healthBar.style.width = `${percent}%`;
            
            if (percent > 50) healthBar.style.background = 'linear-gradient(90deg, #52c41a, #73d13d)'; 
            else if (percent > 25) healthBar.style.background = 'linear-gradient(90deg, #faad14, #ffc53d)'; 
            else healthBar.style.background = 'linear-gradient(90deg, #ff4d4f, #ff7875)'; 
            
            const shieldPercent = Math.max(0, (player.shieldHp / player.maxShield) * 100);
            shieldBar.style.width = `${shieldPercent}%`;
        }

        function addScore(points, x, y) {
            score += Math.floor(points);
            scoreDisplay.innerText = score;
            if (x && y) floatingTexts.push(new FloatingText(x, y, `+${Math.floor(points)}`, '#0ff'));
        }

        // --- CORE GAME LOOP ---

        function startGame(selectedDifficulty) {
            if (typeof selectedDifficulty === 'string') difficulty = selectedDifficulty;

            SoundManager.init();
            startScreen.classList.remove('active');
            gameOverScreen.classList.remove('active');
            hud.classList.add('active');
            
            clearTimeout(announcementTimeout);
            announcement.style.display = 'none';
            mobileHint.style.display = window.innerWidth <= 768 ? 'block' : 'none';
            
            player = new Player();
            score = 0; level = 1; wave = 0; frameCount = 0;
            isTransitioning = false;
            particles = []; enemies = []; projectiles = []; 
            enemyProjectiles = []; powerups = []; floatingTexts = [];
            
            initBackground(); 
            for (let k in keys) keys[k] = false; 
            
            scoreDisplay.innerText = score; levelDisplay.innerText = level; waveDisplay.innerText = '1';
            updateHealthBar();
            
            gameState = 'PLAYING';
            setTimeout(() => { mobileHint.style.display = 'none'; }, 3000);
        }

        function endGame() {
            gameState = 'GAMEOVER';
            createParticles(player.x, player.y, '#f00', 100, 15);
            
            setTimeout(() => {
                hud.classList.remove('active');
                gameOverScreen.classList.add('active');
                finalScore.innerText = score;
            }, 1500);
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            nebulae.forEach(neb => { neb.update(); neb.draw(); });
            stars.forEach(star => { star.update(); star.draw(); });

            if (gameState === 'PLAYING' || gameState === 'GAMEOVER') {
                frameCount++;

                [particles, floatingTexts].forEach(arr => {
                    for (let i = arr.length - 1; i >= 0; i--) {
                        if (arr[i].alpha <= 0) arr.splice(i, 1);
                        else { arr[i].update(); arr[i].draw(); }
                    }
                });

                if (gameState === 'PLAYING') {
                    player.update(); player.draw();
                    spawnEnemyFormation();

                    for (let i = powerups.length - 1; i >= 0; i--) {
                        const pu = powerups[i];
                        pu.update(); pu.draw();

                        if (pu.y > canvas.height + pu.radius) { powerups.splice(i, 1); continue; }

                        if (dist(player.x, player.y, pu.x, pu.y) < player.width/2 + pu.radius) {
                            SoundManager.powerup();
                            if (pu.type === 1) player.weaponLevel = Math.min(9, player.weaponLevel + 2);
                            else if (pu.type === 2) player.health = Math.min(player.maxHealth, player.health + 40);
                            else if (pu.type === 3) player.shieldHp = player.maxShield; 
                            
                            updateHealthBar();
                            createParticles(pu.x, pu.y, '#fff', 15, 6);
                            floatingTexts.push(new FloatingText(pu.x, pu.y, pu.icon === 'W' ? 'UPGRADE' : (pu.icon === 'H' ? 'HEAL' : 'SHIELD'), pu.color));
                            powerups.splice(i, 1);
                        }
                    }

                    for (let i = projectiles.length - 1; i >= 0; i--) {
                        const proj = projectiles[i];
                        proj.update(); proj.draw();

                        if (proj.y < 0) { projectiles.splice(i, 1); continue; }

                        for (let j = enemies.length - 1; j >= 0; j--) {
                            const enemy = enemies[j];
                            const hitRadius = enemy.type === 4 ? enemy.width/2 : enemy.width/2;
                            
                            if (dist(proj.x, proj.y, enemy.x, enemy.y) < proj.radius + hitRadius) {
                                enemy.health--;
                                projectiles.splice(i, 1);
                                createParticles(proj.x, proj.y, proj.color, 5, 5);

                                if (enemy.health <= 0) {
                                    if (enemy.type === 4) SoundManager.bossExplosion();
                                    else SoundManager.explosion();
                                    
                                    createParticles(enemy.x, enemy.y, enemy.coreColor, enemy.type === 4 ? 80 : 20, enemy.type === 4 ? 12 : 8);
                                    addScore(enemy.scoreValue, enemy.x, enemy.y);
                                    
                                    if (Math.random() < (enemy.type === 4 ? 1.0 : 0.15)) powerups.push(new PowerUp(enemy.x, enemy.y));
                                    enemies.splice(j, 1);
                                }
                                break; 
                            }
                        }
                    }

                    for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
                        const proj = enemyProjectiles[i];
                        proj.update(); proj.draw();

                        if (proj.y > canvas.height) { enemyProjectiles.splice(i, 1); continue; }

                        if (!player.isInvulnerable) {
                            if (proj.x > player.x - player.width/2 && proj.x < player.x + player.width/2 &&
                                proj.y > player.y - player.height/2 && proj.y < player.y + player.height/2) {
                                player.takeDamage(proj.isBoss ? 25 : 15);
                                enemyProjectiles.splice(i, 1);
                            }
                        }
                    }

                    for (let i = enemies.length - 1; i >= 0; i--) {
                        const enemy = enemies[i];
                        enemy.update(); enemy.draw();

                        if (enemy.y > canvas.height + enemy.height) { enemies.splice(i, 1); continue; }

                        if (!player.isInvulnerable && enemy.state !== 'ENTERING') {
                            const hitRadius = enemy.type === 4 ? enemy.width/2.5 : enemy.width/2;
                            if (dist(player.x, player.y, enemy.x, enemy.y) < hitRadius + player.width/2) {
                                player.takeDamage(enemy.type === 4 ? 50 : 25); 
                                if(enemy.type !== 4) { 
                                    enemy.health = 0; enemies.splice(i, 1);
                                    createParticles(enemy.x, enemy.y, enemy.coreColor, 20, 8);
                                }
                            }
                        }
                    }
                }
            }
        }

        // --- EVENT LISTENERS ---
        window.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        window.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        let isTouching = false; let touchStartX = 0; let playerStartX = 0;
        window.addEventListener('touchstart', (e) => {
            if (gameState !== 'PLAYING') return;
            isTouching = true; touchStartX = e.touches[0].clientX;
            if (player) playerStartX = player.x;
            keys[' '] = true;
        }, {passive: false});

        window.addEventListener('touchmove', (e) => {
            if (gameState !== 'PLAYING') return;
            e.preventDefault(); 
            if (player) {
                player.x = playerStartX + (e.touches[0].clientX - touchStartX);
                if (player.x < player.width/2) player.x = player.width/2;
                if (player.x > canvas.width - player.width/2) player.x = canvas.width - player.width/2;
            }
        }, {passive: false});

        window.addEventListener('touchend', () => { isTouching = false; keys[' '] = false; });
        window.addEventListener('touchcancel', () => { isTouching = false; keys[' '] = false; });

        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.addEventListener('click', (e) => startGame(e.target.getAttribute('data-diff')));
        });
        restartBtn.addEventListener('click', () => startGame(difficulty));

        menuBtn.addEventListener('click', () => {
            gameOverScreen.classList.remove('active');
            startScreen.classList.add('active');
            gameState = 'START';
            
            // Clear screen of lingering explosions and entities
            particles = []; 
            enemies = []; 
            projectiles = []; 
            enemyProjectiles = []; 
            powerups = []; 
            floatingTexts = [];
            initBackground(); 
        });

        window.onload = () => { initBackground(); animate(); };
    </script>
</body>
</html>
